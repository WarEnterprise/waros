name: WarOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  rust:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, clippy, rustfmt

      - name: Build workspace
        run: cargo +stable build --workspace

      - name: Test workspace
        run: cargo +stable test --workspace

      - name: Clippy
        run: cargo +stable clippy --workspace --all-targets -- -W clippy::all -W clippy::pedantic -A clippy::module_name_repetitions -A clippy::cast_possible_truncation

      - name: Format check
        run: cargo +stable fmt --all -- --check

      - name: Docs
        run: cargo +stable doc --no-deps --workspace

      - name: Build kernel
        run: cd kernel && cargo +nightly build --release --target x86_64-unknown-none

  python:
    runs-on: ubuntu-latest
    needs: rust
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Install Python test dependencies
        run: .venv/bin/python -m pip install --upgrade pip maturin pytest

      - name: Install Python bindings
        run: |
          cd crates/waros-python
          ../../.venv/bin/maturin develop --release

      - name: Test Python bindings
        run: .venv/bin/python -m pytest crates/waros-python/tests/test_waros.py -v

  build-wheels:
    name: Build Wheels (${{ matrix.os }})
    if: github.event_name == 'release'
    needs: python
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -m crates/waros-python/Cargo.toml

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: target/wheels/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [python, build-wheels]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: target/wheels
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: target/wheels/
